name: Publish Release

on:
  push:
    branches:
      - release
    paths:
      - 'ddns_updater/VERSION'
      - 'ddns_updater/**'
      - '.github/workflows/**'

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ddns_updater

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "${version}" ]]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tagcheck
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.tagcheck.outputs.exists == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Download dependencies
        if: steps.tagcheck.outputs.exists == 'false'
        run: go mod download

      - name: Run tests
        if: steps.tagcheck.outputs.exists == 'false'
        run: go test ./...

      - name: Build release binaries
        if: steps.tagcheck.outputs.exists == 'false'
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/ddns-updater-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/ddns-updater-linux-arm64 .

      - name: Create tag
        if: steps.tagcheck.outputs.exists == 'false'
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.tagcheck.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ddns_updater/dist/ddns-updater-linux-amd64
            ddns_updater/dist/ddns-updater-linux-arm64