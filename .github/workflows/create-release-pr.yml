name: Create Release PR

on:
  push:
    branches:
      - master
    paths:
      - 'ddns_updater/**'
      - '.github/workflows/**'
      - '.github/CODEOWNERS'
      - 'scripts/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: create-release-pr
  cancel-in-progress: false

jobs:
  create-release-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches and tags
        run: |
          git fetch --all --tags

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v0.*' --sort=-version:refname | head -n1)"

          if [[ -z "${latest_tag}" ]]; then
            echo "next_version=0.1.0" >> "$GITHUB_OUTPUT"
            echo "next_tag=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "release_branch=release-pr/v0.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ver="${latest_tag#v}"
          major="${ver%%.*}"
          rest="${ver#*.}"
          minor="${rest%%.*}"
          patch="${rest##*.}"

          commit_msg="$(git log -1 --pretty=%B)"

          if [[ "${commit_msg}" == *"[minor]"* ]]; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          next_version="${major}.${minor}.${patch}"
          next_tag="v${next_version}"
          release_branch="release-pr/${next_tag}"

          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "release_branch=${release_branch}" >> "$GITHUB_OUTPUT"

      - name: Prepare release branch
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "${{ steps.version.outputs.release_branch }}"
          echo "${{ steps.version.outputs.next_version }}" > ddns_updater/VERSION

          git add ddns_updater/VERSION

          if git diff --cached --quiet; then
            echo "No VERSION change to commit."
          else
            git commit -m "chore(release): prepare ${{ steps.version.outputs.next_tag }}"
          fi

          git push origin "${{ steps.version.outputs.release_branch }}" --force

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          existing_pr="$(gh pr list \
            --base release \
            --head "${{ steps.version.outputs.release_branch }}" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [[ -n "${existing_pr}" && "${existing_pr}" != "null" ]]; then
            echo "Release PR already exists: #${existing_pr}"
            exit 0
          fi

          gh pr create \
            --base release \
            --head "${{ steps.version.outputs.release_branch }}" \
            --title "Release ${{ steps.version.outputs.next_tag }}" \
            --body "Automated release PR for ${{ steps.version.outputs.next_tag }}.
          
          - Updates ddns_updater/VERSION
          - Targets protected release branch
          - Must be approved by CODEOWNER before merge"