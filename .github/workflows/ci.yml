name: CI

on:
  pull_request:
    branches:
      - master
    paths:
      - 'ddns_updater/**'
      - '.github/workflows/**'
      - '.github/CODEOWNERS'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ddns_updater

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...