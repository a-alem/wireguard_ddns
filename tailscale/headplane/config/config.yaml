host: "0.0.0.0"
port: 3000
base_url: "https://headplane.yourdomain.com"
cookie_secret: "replace-with-a-random-32+char-secret"
cookie_secure: true
data_path: "/var/lib/headplane"

headscale:
  url: "http://headscale:8080"
  public_url: "https://headscale.yourdomain.com"
  config_path: "/etc/headscale/config.yaml"
  config_strict: true

integration:
  agent:
    enabled: false

  docker:
    enabled: false

  kubernetes:
    enabled: false

  proc:
    enabled: false